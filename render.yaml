services:
  - type: web
    name: house-grocery-intelligence
    runtime: docker
    dockerfilePath: ./Dockerfile
    plan: starter
    envVars:
      - key: PORT
        value: 3000
      - key: PORT_API
        value: 4000
      - key: DATABASE_URL
        fromDatabase:
          name: house-grocery-db
          property: connectionString
      - key: OPENAI_API_KEY
        sync: false
      - key: OPENAI_MODEL
        value: gpt-4.1-mini

databases:
  - name: house-grocery-db
    plan: free
